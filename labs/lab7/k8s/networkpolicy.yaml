apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: juice-shop-policy
  namespace: juice-shop
  labels:
    app.kubernetes.io/name: juice-shop
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: juice-shop
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from: []
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to: []
      ports:
        - protocol: TCP
          port: 443
