apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: juice-shop
    app.kubernetes.io/version: "20.0.0"
  name: juice-shop
  namespace: juice-shop
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: juice-shop
  template:
    metadata:
      labels:
        app.kubernetes.io/name: juice-shop
        app.kubernetes.io/version: "20.0.0"
    spec:
      terminationGracePeriodSeconds: 30
      automountServiceAccountToken: false
      serviceAccountName: juice-shop-app
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - image: bkimminich/juice-shop@sha256:fd58bdc9745416afce8184ee0666278a436574633ea7880365153a63bfd418b0
          imagePullPolicy: IfNotPresent
          name: juice-shop
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "ALL"
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /tmp
              name: vol-tmp
            - mountPath: /usr/src/app/logs
              name: vol-logs
            - mountPath: /usr/src/app/data
              name: vol-data
      volumes:
        - name: vol-tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: vol-logs
          emptyDir:
            sizeLimit: 128Mi
        - name: vol-data
          emptyDir:
            sizeLimit: 256Mi
